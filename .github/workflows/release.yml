name: Build and Release Binaries

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
            binary_name: GeminiWatermarkTool-Go-linux-amd64
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
            binary_name: GeminiWatermarkTool-Go-windows-amd64.exe
          - os: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            binary_name: GeminiWatermarkTool-Go-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -ldflags="-w -s" -o ${{ matrix.binary_name }} main.go

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
